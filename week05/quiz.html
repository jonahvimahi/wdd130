<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>HTML &amp; CSS Quiz</h1>
    </header>
    <main>
        <form>
            <div class="form-item">
                <label for="q1">Q1. What HTML tag is used to create a hyperlink?</label>
                <input type="text" id="q1" name="q1" placeholder="Type your answer here">
            </div>

            <div class="form-item">
                <label for="q2">Q2. In your own words, explain the difference between a class
                    selector and an ID selector in CSS.</label>
                <textarea id="q2" name="q2" rows="5"
                  placeholder="Write your answer here..."></textarea>
            </div>

            <div class="form-item">
                <label for="q3">Q3. Which CSS property is used to control the layout of children in
                    a flex container?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="display">display</option>
                    <option value="justify-content">justify-content</option>
                    <option value="flex-direction">flex-direction</option>
                    <option value="align-items">align-items</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">Q4. How many heading levels does HTML provide? (enter a
                    number)</label>
                <input type="number" id="q4" name="q4" min="1" max="10">
            </div>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 HTML &amp; CSS Quiz</p>
    </footer>
</body>

</html>
